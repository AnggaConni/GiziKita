<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GiziDesa - AI Nutrition Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 460px;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width: 640px) {
            body { padding: 24px; }
            .app-container {
                height: min(880px, 92vh);
                border-radius: 2.75rem;
                border: 9px solid #0f172a;
                box-shadow: 0 30px 60px -15px rgba(0,0,0,0.35);
                overflow: hidden;
            }
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .progress-bar-fill { transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.96); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.16,1,0.3,1); }

        .toast {
            visibility: hidden;
            max-width: 88%;
            background-color: #0f172a;
            color: #fff;
            text-align: center;
            border-radius: 14px;
            padding: 13px 18px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity .3s, bottom .3s;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
        .toast.show { visibility: visible; opacity: 1; bottom: 105px; }

        .nav-btn.active { color: #059669; }
        .nav-btn.active .nav-pill { background-color: #d1fae5; }
        .nav-btn.active i { font-weight: 700; }
    </style>
</head>
<body class="text-slate-800">

    <div class="app-container">
        <!-- Header -->
        <header class="bg-gradient-to-br from-emerald-600 to-teal-600 text-white px-5 pt-5 pb-5 z-10 shadow-lg shrink-0">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2.5">
                    <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm">
                        <i class="ph-fill ph-leaf text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-extrabold tracking-tight leading-none">GiziDesa</h1>
                        <p class="text-[11px] text-emerald-100">Nutrition Decision Support</p>
                    </div>
                </div>
                <button id="gps-status" class="flex items-center text-xs bg-white/15 hover:bg-white/25 transition px-3 py-2 rounded-full backdrop-blur-sm" onclick="app.getLocation()">
                    <i class="ph ph-map-pin mr-1.5 text-base"></i> <span>Set Lokasi</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 px-4 py-5 overflow-y-auto relative"></main>

        <!-- Bottom Navigation -->
        <nav class="w-full bg-white/95 backdrop-blur border-t border-slate-100 flex justify-around px-2 pt-2 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.06)] shrink-0"
             style="padding-bottom: calc(8px + var(--safe-bottom));">
            <button onclick="app.switchTab('profile')" class="nav-btn flex flex-col items-center w-1/4 text-slate-400 transition" data-target="profile">
                <span class="nav-pill px-5 py-1 rounded-full transition-colors"><i class="ph-bold ph-user text-xl"></i></span>
                <span class="text-[10px] font-semibold mt-1">Keluarga</span>
            </button>
            <button onclick="app.switchTab('market')" class="nav-btn flex flex-col items-center w-1/4 text-slate-400 transition" data-target="market">
                <span class="nav-pill px-5 py-1 rounded-full transition-colors"><i class="ph-bold ph-storefront text-xl"></i></span>
                <span class="text-[10px] font-semibold mt-1">Pasar</span>
            </button>
            <button onclick="app.switchTab('planner')" class="nav-btn flex flex-col items-center w-1/4 text-slate-400 transition" data-target="planner">
                <span class="nav-pill px-5 py-1 rounded-full transition-colors"><i class="ph-bold ph-magic-wand text-xl"></i></span>
                <span class="text-[10px] font-semibold mt-1">Rekomendasi</span>
            </button>
            <button onclick="app.switchTab('data')" class="nav-btn flex flex-col items-center w-1/4 text-slate-400 transition" data-target="data">
                <span class="nav-pill px-5 py-1 rounded-full transition-colors"><i class="ph-bold ph-database text-xl"></i></span>
                <span class="text-[10px] font-semibold mt-1">Data</span>
            </button>
        </nav>
    </div>

    <div id="toast" class="toast">Notifikasi</div>

    <!-- ============ TEMPLATE: PROFILE ============ -->
    <template id="view-profile">
        <div class="space-y-5 animate-fade-in">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex items-center gap-2 mb-1">
                    <i class="ph-fill ph-baby text-emerald-600 text-xl"></i>
                    <h2 class="text-base font-bold text-slate-800">Profil Anak & Anggaran</h2>
                </div>
                <p class="text-xs text-slate-500 mb-4 leading-relaxed">Data ini dipakai AI untuk menghitung kebutuhan gizi harian dan mengoptimasi menu.</p>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Umur Anak (Bulan)</label>
                        <input type="number" id="input-age" oninput="app.autoSaveProfile()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition" placeholder="Misal: 24">
                    </div>
                    <div class="flex gap-3">
                        <div class="w-1/2">
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Berat (kg)</label>
                            <input type="number" id="input-weight" oninput="app.autoSaveProfile()" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition" placeholder="10.5">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Tinggi (cm)</label>
                            <input type="number" id="input-height" oninput="app.autoSaveProfile()" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition" placeholder="85">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Anggaran Makan Harian</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 text-sm font-medium">Rp</span>
                            <input type="number" id="input-budget" oninput="app.autoSaveProfile()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-10 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition" placeholder="25000">
                        </div>
                    </div>
                </div>

                <div class="mt-3 flex justify-end h-4">
                    <span id="save-indicator" class="text-[11px] font-semibold text-emerald-600 flex items-center opacity-0 transition-opacity duration-300">
                        <i class="ph-fill ph-check-circle mr-1"></i> Tersimpan otomatis
                    </span>
                </div>
            </div>

            <div id="risk-assessment" class="hidden"></div>
        </div>
    </template>

    <!-- ============ TEMPLATE: MARKET ============ -->
    <template id="view-market">

            <div id="market-items" class="space-y-2.5"></div>
        </div>
    </template>

    <!-- ============ TEMPLATE: PLANNER ============ -->
    <template id="view-planner">

                    <i class="ph-fill ph-magic-wand mr-2 text-lg"></i> Hasilkan Rekomendasi
                </button>
            </div>

            <div id="planner-results" class="hidden space-y-5"></div>
        </div>
    </template>

    <!-- ============ TEMPLATE: DATA (FIXED & COMPLETE) ============ -->

                <div class="flex items-start gap-3">

                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-slate-700">Ekspor Laporan PDF</h3>
                        <p class="text-xs text-slate-500 mb-3">Unduh hasil rekomendasi & profil sebagai laporan.</p>
                        <button onclick="app.exportToPDF()" class="w-full bg-slate-800 text-white py-2.5 rounded-xl font-semibold text-sm active:scale-95 hover:bg-slate-700 transition">Download Laporan (PDF)</button>

                </div>
            </div>

            <!-- Sample -->

                <div class="flex items-start gap-3">

                        <button onclick="app.exportJSON()" class="w-full bg-blue-50 text-blue-700 border border-blue-200 py-2.5 rounded-xl font-semibold text-sm active:scale-95 hover:bg-blue-100 transition">Ekspor JSON</button>

                    </div>
                </div>
            </div>

        </div>
    </template>

              tips: "Suwir ayam halus agar mudah ditelan. Brokoli sumber vitamin C penambah penyerapan zat besi." },
            { id: 'r9', name: 'Nasi + Pepes Ikan Kembung + Kangkung', ingredients: [{id:'beras',g:100},{id:'kembung',g:80},{id:'kangkung',g:80}],
              tips: "Ikan kembung kaya omega-3 untuk perkembangan otak. Pepes lebih sehat daripada digoreng." },
            { id: 'r10', name: 'Ubi Rebus + Telur Rebus + Pisang', ingredients: [{id:'ubi',g:150},{id:'telur',g:55},{id:'pisang',g:80}],
              tips: "Menu sarapan murah meriah & padat energi. Ubi sumber Vitamin A & serat." },
            { id: 'r11', name: 'Nasi + Teri Goreng + Tahu + Bayam', ingredients: [{id:'beras',g:100},{id:'teri',g:30},{id:'tahu',g:60},{id:'bayam',g:60},{id:'minyak',g:8}],
              tips: "Ikan teri (dimakan dengan tulang) sumber kalsium luar biasa untuk pertumbuhan tulang." },
            { id: 'r12', name: 'Jagung Rebus + Tempe + Pepaya', ingredients: [{id:'jagung',g:150},{id:'tempe',g:50},{id:'pepaya',g:100},{id:'minyak',g:5}],
              tips: "Pepaya membantu pencernaan & kaya Vitamin A. Cocok sebagai selingan bergizi." }
        ];

        class GiziDesaApp {
            constructor() {
                this.state = this.loadState();
                this.currentTab = 'profile';
                this.marketFilter = 'all';
                this.init();
            }

            loadState() {
                const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Merge market baru kalau jumlah item bertambah (versi upgrade)
                        const init = getInitialState();
                        if (!parsed.market || parsed.market.length < init.market.length) {
                            const priceMap = {};
                            (parsed.market || []).forEach(m => priceMap[m.id] = m.price);
                            parsed.market = init.market.map(m => ({ ...m, price: priceMap[m.id] ?? m.price }));
                        }
                        return parsed;
                    } catch (e) { console.error("Corrupted storage", e); }
                }
                return getInitialState();
            }

            saveState() { localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(this.state)); }

            init() {
                this.switchTab('profile');
                this.updateGPSUI();
            }

            switchTab(tabId) {
                this.currentTab = tabId;
                const main = document.getElementById('main-content');
                const template = document.getElementById(`view-${tabId}`);
                if (template) {
                    main.innerHTML = '';
                    main.appendChild(template.content.cloneNode(true));
                    main.scrollTop = 0;
                    this.afterRender(tabId);
                }
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.target === tabId);
                });
            }

            afterRender(tabId) {
                if (tabId === 'profile') {
                    document.getElementById('input-age').value = this.state.profile.age || '';
                    document.getElementById('input-weight').value = this.state.profile.weight || '';
                    document.getElementById('input-height').value = this.state.profile.height || '';
                    document.getElementById('input-budget').value = this.state.profile.budget || '';
                    this.evaluateRisk();
                } else if (tabId === 'market') {
                    this.renderMarketFilters();
                    this.renderMarketList();
                } else if (tabId === 'planner') {
                    document.getElementById('lbl-planner-budget').textContent = this.formatIDR(this.state.profile.budget);
                }
            }

            formatIDR(num) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);
            }

            showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            getLocation() {
                if ("geolocation" in navigator) {
                    this.showToast("Mencari lokasi...");
                    navigator.geolocation.getCurrentPosition((pos) => {
                        this.state.profile.lat = pos.coords.latitude;
                        this.state.profile.lng = pos.coords.longitude;
                        this.state.profile.locationName = "Lokasi Tersimpan";
                        this.saveState();
                        this.updateGPSUI();
                        this.showToast("Lokasi berhasil disimpan!");
                    }, () => {
                        this.showToast("Gagal mengambil GPS. Pastikan izin lokasi aktif.");
                    }, { enableHighAccuracy: false, timeout: 5000 });
                } else {
                    this.showToast("Browser tidak mendukung geolokasi.");
                }
            }

            updateGPSUI() {
                const el = document.getElementById('gps-status');
                if (this.state.profile.lat) {
                    el.innerHTML = `<i class="ph-fill ph-check-circle mr-1.5 text-base"></i> <span>Tersimpan</span>`;
                }
            }

            autoSaveProfile() {
                const age = parseInt(document.getElementById('input-age').value) || 0;
                const weight = parseFloat(document.getElementById('input-weight').value) || 0;
                const height = parseFloat(document.getElementById('input-height').value) || 0;
                const budget = parseInt(document.getElementById('input-budget').value) || 0;
                this.state.profile = { ...this.state.profile, age, weight, height, budget };
                this.saveState();
                this.evaluateRisk();
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.classList.remove('opacity-0');
                    clearTimeout(this.saveTimeout);
                    this.saveTimeout = setTimeout(() => indicator.classList.add('opacity-0'), 2000);
                }
            }

            evaluateRisk() {
                const { age, height } = this.state.profile;
                const riskDiv = document.getElementById('risk-assessment');
                if (!riskDiv || !age) return;

                const expectedHeight = 50 + (age * 1.5);
                riskDiv.classList.remove('hidden');
                riskDiv.classList.add('animate-pop');

                let title, text, badges, theme, icon;
                if (height && height < expectedHeight * 0.9) {
                    theme = { box: 'bg-red-50 border-red-200', title: 'text-red-800', iconC: 'text-red-500' };
                    icon = 'ph-warning-circle';
                    title = 'Indikasi Risiko Stunting';
                    text = `Pada usia <b>${age} bulan</b> dengan tinggi <b>${height} cm</b>, anak berada di bawah kurva pertumbuhan rata-rata. AI akan memprioritaskan resep tinggi <b>Protein hewani</b> & <b>Zinc</b>.`;
                    badges = [
                        { lbl: 'Target: Protein Hewani', cl: 'bg-red-100 text-red-800 border-red-200' },
                        { lbl: 'Target: Zinc', cl: 'bg-amber-100 text-amber-800 border-amber-200' },
                        { lbl: 'Target: Zat Besi', cl: 'bg-orange-100 text-orange-800 border-orange-200' }
                    ];
                } else {
                    theme = { box: 'bg-emerald-50 border-emerald-200', title: 'text-emerald-800', iconC: 'text-emerald-500' };
                    icon = 'ph-check-circle';
                    title = 'Pertumbuhan Normal';
                    text = `Pertumbuhan anak terpantau normal. AI akan menyusun menu seimbang untuk menjaga imunitas & energi.`;
                    badges = [{ lbl: 'Pemeliharaan Gizi Seimbang', cl: 'bg-emerald-100 text-emerald-800 border-emerald-200' }];
                }

                riskDiv.className = `border rounded-2xl p-4 shadow-sm ${theme.box}`;
                riskDiv.innerHTML = `
                    <h3 class="font-bold ${theme.title} mb-2 flex items-center text-sm">
                        <i class="ph-fill ${icon} ${theme.iconC} mr-2 text-xl"></i> ${title}
                    </h3>
                    <p class="text-sm text-slate-600 leading-relaxed">${text}</p>
                    <div class="mt-3 flex flex-wrap gap-2">
                        ${badges.map(b => `<span class="text-[10px] font-bold px-2.5 py-1 rounded-full border ${b.cl}">${b.lbl}</span>`).join('')}
                    </div>`;
            }

            renderMarketFilters() {
                const container = document.getElementById('market-filters');
                if (!container) return;
                container.innerHTML = '';
                Object.keys(CATEGORIES).forEach(key => {
                    const c = CATEGORIES[key];
                    const active = this.marketFilter === key;
                    const btn = document.createElement('button');
                    btn.className = `shrink-0 flex items-center gap-1.5 px-3.5 py-2 rounded-full text-xs font-semibold border transition ${active ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-slate-600 border-slate-200'}`;
                    btn.innerHTML = `<i class="ph-bold ${c.icon}"></i> ${c.lbl}`;
                    btn.onclick = () => { this.marketFilter = key; this.renderMarketFilters(); this.renderMarketList(); };
                    container.appendChild(btn);
                });
            }

            renderMarketList() {
                const container = document.getElementById('market-items');
                if (!container) return;
                container.innerHTML = '';

                const items = this.state.market.filter(m => this.marketFilter === 'all' || m.cat === this.marketFilter);
                if (items.length === 0) {
                    container.innerHTML = `<p class="text-center text-sm text-slate-400 py-8">Tidak ada bahan di kategori ini.</p>`;
                    return;
                }

                items.forEach(item => {
                    const realIndex = this.state.market.findIndex(m => m.id === item.id);
                    const div = document.createElement('div');
                    div.className = "bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center animate-fade-in";
                    div.innerHTML = `
                        <div class="flex items-center min-w-0">
                            <div class="bg-emerald-50 p-2.5 rounded-xl mr-3 shrink-0">
                                <i class="ph-fill ${CAT_ICON(item.cat)} text-xl text-emerald-600"></i>
                            </div>
                            <div class="min-w-0">
                                <p class="font-semibold text-sm text-slate-800 truncate">${item.name}</p>
                                <p class="text-xs text-slate-400">Per ${item.unit}</p>
                            </div>
                        </div>
                        <div class="w-28 shrink-0">
                            <div class="relative">
                                <span class="absolute left-2.5 top-2.5 text-slate-400 text-xs font-medium">Rp</span>
                                <input type="number" inputmode="numeric"
                                    class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 pl-7 text-xs font-semibold text-right focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:outline-none transition"
                                    value="${item.price}"
                                    onchange="app.updatePrice(${realIndex}, this.value)">
                            </div>
                        </div>`;
                    container.appendChild(div);
                });
            }

            updatePrice(index, newPrice) {
                const val = parseInt(newPrice);
                if (val >= 0) { this.state.market[index].price = val; this.saveState(); }
            }

            getTargetNutrition() {
                const age = this.state.profile.age;
                let target = { cal: 1000, p: 13, a: 400, z: 3, fe: 7 };
                if (age > 36) target = { cal: 1400, p: 19, a: 450, z: 5, fe: 10 };
                return target;
            }

            calculateRecipeStats(recipe) {
                let totalCost = 0;
                let totalNut = { cal: 0, p: 0, a: 0, z: 0, fe: 0 };
                recipe.ingredients.forEach(ing => {
                    const m = this.state.market.find(x => x.id === ing.id);
                    if (m) {
                        totalCost += (ing.g / m.qty_g) * m.price;
                        const mul = ing.g / 100;
                        totalNut.cal += m.nut.cal * mul;
                        totalNut.p   += m.nut.p   * mul;
                        totalNut.a   += m.nut.a   * mul;
                        totalNut.z   += m.nut.z   * mul;
                        totalNut.fe  += m.nut.fe  * mul;
                    }
                });
                return { cost: totalCost, nut: totalNut };
            }

            generatePlan() {
                const resultsArea = document.getElementById('planner-results');
                resultsArea.classList.remove('hidden');
                resultsArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-center">
                        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-sm font-medium text-slate-500">AI menghitung kombinasi gizi terbaik...</p>
                    </div>`;
                setTimeout(() => this.executeOptimizationAlgorithm(), 800);
            }

            executeOptimizationAlgorithm() {
                const budget = this.state.profile.budget;
                const targetNut = this.getTargetNutrition();
                const analyzed = RECIPE_DB.map(r => ({ ...r, ...this.calculateRecipeStats(r) }));

                let bestMenu = null, bestScore = -1, bestStats = null;

                for (let i=0;i<analyzed.length;i++)
                    for (let j=i+1;j<analyzed.length;j++)
                        for (let k=j+1;k<analyzed.length;k++) {
                            const [r1,r2,r3] = [analyzed[i],analyzed[j],analyzed[k]];
                            const totalCost = r1.cost + r2.cost + r3.cost;
                            if (totalCost <= budget) {
                                const tP = r1.nut.p+r2.nut.p+r3.nut.p;
                                const tFe= r1.nut.fe+r2.nut.fe+r3.nut.fe;
                                const tZ = r1.nut.z+r2.nut.z+r3.nut.z;
                                const tA = r1.nut.a+r2.nut.a+r3.nut.a;
                                const score = Math.min(tP/targetNut.p,1)*40 + Math.min(tZ/targetNut.z,1)*30 +
                                              Math.min(tFe/targetNut.fe,1)*20 + Math.min(tA/targetNut.a,1)*10;
                                if (score > bestScore) {
                                    bestScore = score;
                                    bestMenu = [r1,r2,r3];
                                    bestStats = { cost: totalCost, nut: {
                                        cal: r1.nut.cal+r2.nut.cal+r3.nut.cal, p:tP, a:tA, z:tZ, fe:tFe } };
                                }
                            }
                        }

                if (!bestMenu) {
                    const sorted = [...analyzed].sort((a,b)=>a.cost-b.cost);
                    let menu=[], cost=0, nut={cal:0,p:0,a:0,z:0,fe:0};
                    for (const r of sorted) {
                        if (cost + r.cost <= budget) {
                            menu.push(r); cost += r.cost;
                            nut.p+=r.nut.p; nut.a+=r.nut.a; nut.z+=r.nut.z; nut.fe+=r.nut.fe; nut.cal+=r.nut.cal;
                        }
                    }
                    if (menu.length) { bestMenu = menu; bestStats = { cost, nut }; }
                }
                this.renderPlannerResults(bestMenu, bestStats, targetNut);
            }

            renderPlannerResults(menus, stats, target) {
                this.lastGeneratedMenu = menus;
                this.lastGeneratedStats = stats;
                this.lastTargetNut = target;
                const area = document.getElementById('planner-results');

                if (!menus || menus.length === 0) {
                    area.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-2xl p-5 text-center">
                            <i class="ph-fill ph-warning-circle text-3xl text-red-500 mb-2"></i>
                            <p class="text-sm font-semibold text-red-700">Anggaran terlalu rendah untuk menyusun menu.</p>
                            <p class="text-xs text-red-500 mt-1">Coba tambah anggaran atau periksa harga pasar lokal.</p>
                        </div>`;
                    return;
                }

                const times = ['Sarapan', 'Makan Siang', 'Makan Malam', 'Selingan'];
                const allTips = new Set();
                let menuHTML = '';
                menus.forEach((m, i) => {
                    if (m.tips) allTips.add(m.tips);
                    menuHTML += `
                        <div class="relative pl-5">
                            <div class="absolute left-0 top-1.5 w-2.5 h-2.5 bg-emerald-500 rounded-full ring-4 ring-emerald-100"></div>
                            <p class="text-[11px] font-bold text-emerald-600 uppercase tracking-wide">${times[i] || 'Selingan'}</p>
                            <p class="text-sm font-semibold text-slate-800 mt-0.5">${m.name}</p>
                            <p class="text-xs text-slate-400 mt-0.5">Est. Biaya: ${this.formatIDR(m.cost)}</p>
                        </div>`;
                });

                const bar = (label, cur, max, unit, cl) => {
                    const pct = Math.min((cur/max)*100, 100);
                    return `
                        <div>
                            <div class="flex justify-between text-xs mb-1.5">
                                <span class="font-semibold text-slate-700">${label}</span>
                                <span class="text-slate-400">${cur.toFixed(1)} / ${max} ${unit}</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5">
                                <div class="${cl} h-2.5 rounded-full progress-bar-fill" style="width:0%" data-target-width="${pct}%"></div>
                            </div>
                        </div>`;
                };

                area.innerHTML = `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-pop">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-800 text-sm">Rekomendasi Menu Harian</h3>
                            <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2.5 py-1 rounded-full">Total: ${this.formatIDR(stats.cost)}</span>
                        </div>
                        <div class="space-y-4 border-l-2 border-emerald-100 ml-1">${menuHTML}</div>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-pop">
                        <h3 class="font-bold text-slate-800 mb-4 text-sm">Pemenuhan Target Gizi</h3>
                        <div id="nutrition-bars" class="space-y-4">
                            ${bar('Protein', stats.nut.p, target.p, 'g', 'bg-emerald-500')}
                            ${bar('Zinc', stats.nut.z, target.z, 'mg', 'bg-blue-500')}
                            ${bar('Zat Besi', stats.nut.fe, target.fe, 'mg', 'bg-red-500')}
                            ${bar('Vitamin A', stats.nut.a, target.a, 'mcg', 'bg-amber-500')}
                            ${bar('Kalori', stats.nut.cal, target.cal, 'kcal', 'bg-slate-400')}
                        </div>
                    </div>

                    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 shadow-sm animate-pop">
                        <h3 class="font-bold text-amber-800 mb-2 flex items-center text-sm">
                            <i class="ph-fill ph-lightbulb text-lg mr-2"></i> Strategi Edukasi (Perilaku)
                        </h3>
                        <ul class="text-sm text-amber-900 space-y-2 list-disc pl-4 marker:text-amber-500">
                            ${Array.from(allTips).map(t=>`<li>${t}</li>`).join('') || '<li>Berikan pujian saat anak menghabiskan makanannya.</li>'}
                        </ul>
                    </div>`;

                setTimeout(() => {
                    area.querySelectorAll('.progress-bar-fill').forEach(b => b.style.width = b.dataset.targetWidth);
                }, 100);
            }

            exportJSON() {
                const blob = new Blob([JSON.stringify(this.state, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `GiziDesa_Data_${Date.now()}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                this.showToast("Data berhasil diekspor.");
            }

            importJSON(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed && parsed.profile && parsed.market) {
                            this.state = parsed; this.saveState();
                            this.showToast("Data berhasil diimpor.");
                            this.switchTab('profile');
                        } else throw new Error("Invalid");
                    } catch { this.showToast("Gagal membaca file JSON. Format salah."); }
                };
                reader.readAsText(file);
                event.target.value = '';
            }

            loadSampleData() {
                this.state = getInitialState();
                this.state.profile = { age: 24, weight: 9.5, height: 80, budget: 18000, lat: null, lng: null, locationName: 'Belum diatur' };
                this.saveState();
                this.showToast("Data Kasus Sampel dimuat!");
                this.switchTab('profile');
            }

            exportToPDF() {
                if (!this.lastGeneratedMenu) {
                    this.showToast("Jalankan AI di menu 'Rekomendasi' dulu.");
                    return;
                }
                this.showToast("Memproses dokumen PDF...");
                const container = document.createElement('div');
                container.style.cssText = 'padding:30px;font-family:Inter,sans-serif;color:#1f2937;';
                let html = `
                    <div style="border-bottom:2px solid #059669;padding-bottom:10px;margin-bottom:20px;">
                        <h1 style="color:#059669;margin:0;font-size:24px;">Laporan Intervensi GiziDesa</h1>
                        <p style="margin:5px 0 0;color:#6b7280;font-size:14px;">Nutrition Decision Support System</p>
                    </div>
                    <div style="margin-bottom:20px;background:#f3f4f6;padding:15px;border-radius:8px;">
                        <h3 style="margin-top:0;font-size:16px;">Profil Sasaran</h3>
                        <p style="margin:5px 0;font-size:14px;"><strong>Umur:</strong> ${this.state.profile.age} Bulan | <strong>Berat:</strong> ${this.state.profile.weight} kg | <strong>Tinggi:</strong> ${this.state.profile.height} cm</p>
                        <p style="margin:5px 0;font-size:14px;"><strong>Anggaran Harian:</strong> ${this.formatIDR(this.state.profile.budget)}</p>
                    </div>
                    <h3 style="font-size:16px;border-bottom:1px solid #e5e7eb;padding-bottom:5px;">Rekomendasi Menu AI (Total: ${this.formatIDR(this.lastGeneratedStats.cost)})</h3>
                    <ul style="padding-left:20px;margin-bottom:20px;">`;
                this.lastGeneratedMenu.forEach(m => {
                    html += `<li style="margin-bottom:10px;font-size:14px;"><strong>${m.name}</strong><br>
                        <span style="color:#4b5563;font-size:12px;">Estimasi: ${this.formatIDR(m.cost)} | Tips: ${m.tips}</span></li>`;
                });
                html += `</ul>
                    <h3 style="font-size:16px;border-bottom:1px solid #e5e7eb;padding-bottom:5px;">Capaian Gizi</h3>
                    <table style="width:100%;border-collapse:collapse;font-size:14px;text-align:left;">
                        <tr><th style="padding:8px;border:1px solid #d1d5db;">Nutrisi</th><th style="padding:8px;border:1px solid #d1d5db;">Capaian</th><th style="padding:8px;border:1px solid #d1d5db;">Target</th></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Protein</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.p.toFixed(1)} g</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.p} g</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Zinc</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.z.toFixed(1)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.z} mg</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Zat Besi</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.fe.toFixed(1)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.fe} mg</td></tr>
                    </table>
                    <p style="margin-top:30px;font-size:10px;color:#9ca3af;text-align:center;">Dihasilkan oleh AI GiziDesa - Tanpa Koneksi Internet</p>`;
                container.innerHTML = html;
                html2pdf().set({
                    margin: 0.5, filename: 'Laporan_GiziDesa.pdf',
                    image: { type:'jpeg', quality:0.98 }, html2canvas:{ scale:2 },
                    jsPDF: { unit:'in', format:'a4', orientation:'portrait' }
                }).from(container).save();
            }

            resetData() {
                localStorage.removeItem(LOCAL_STORAGE_KEY);
                this.state = getInitialState();
                this.marketFilter = 'all';
                this.showToast("Semua data direset ke setelan awal.");
                this.switchTab('profile');
            }
        }

        let app;
        window.addEventListener('DOMContentLoaded', () => { app = new GiziDesaApp(); });
    </script>
</body>
