        class GiziDesaApp {
            constructor() {
                this.state = this.loadState();
                this.currentTab = 'profile';
                this.marketFilter = 'all';
                this.init();
            }

            loadState() {
                const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Merge market baru kalau jumlah item bertambah (versi upgrade)
                        const init = getInitialState();
                        if (!parsed.market || parsed.market.length < init.market.length) {
                            const priceMap = {};
                            (parsed.market || []).forEach(m => priceMap[m.id] = m.price);
                            parsed.market = init.market.map(m => ({ ...m, price: priceMap[m.id] ?? m.price }));
                        }
                        return parsed;
                    } catch (e) { console.error("Corrupted storage", e); }
                }
                return getInitialState();
            }

            saveState() { localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(this.state)); }

            init() {
                this.switchTab('profile');
                this.updateGPSUI();
            }

            switchTab(tabId) {
                this.currentTab = tabId;
                const main = document.getElementById('main-content');
                const template = document.getElementById(`view-${tabId}`);
                if (template) {
                    main.innerHTML = '';
                    main.appendChild(template.content.cloneNode(true));
                    main.scrollTop = 0;
                    this.afterRender(tabId);
                }
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.target === tabId);
                });
            }

            afterRender(tabId) {
                if (tabId === 'profile') {
                    document.getElementById('input-age').value = this.state.profile.age || '';
                    document.getElementById('input-weight').value = this.state.profile.weight || '';
                    document.getElementById('input-height').value = this.state.profile.height || '';
                    document.getElementById('input-budget').value = this.state.profile.budget || '';
                    this.evaluateRisk();
                } else if (tabId === 'market') {
                    this.renderMarketFilters();
                    this.renderMarketList();
                } else if (tabId === 'planner') {
                    document.getElementById('lbl-planner-budget').textContent = this.formatIDR(this.state.profile.budget);
                } else if (tabId === 'data') {
                    this.renderHistory(); // <-- Tambahkan baris ini
                }
            }

            formatIDR(num) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);
            }

            showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            getLocation() {
                if ("geolocation" in navigator) {
                    this.showToast("Mencari lokasi...");
                    navigator.geolocation.getCurrentPosition((pos) => {
                        this.state.profile.lat = pos.coords.latitude;
                        this.state.profile.lng = pos.coords.longitude;
                        this.state.profile.locationName = "Lokasi Tersimpan";
                        this.saveState();
                        this.updateGPSUI();
                        this.showToast("Lokasi berhasil disimpan!");
                    }, () => {
                        this.showToast("Gagal mengambil GPS. Pastikan izin lokasi aktif.");
                    }, { enableHighAccuracy: false, timeout: 5000 });
                } else {
                    this.showToast("Browser tidak mendukung geolokasi.");
                }
            }

            updateGPSUI() {
                const el = document.getElementById('gps-status');
                if (this.state.profile.lat) {
                    // Jika ada data GPS, tampilkan Tersimpan
                    el.innerHTML = `<i class="ph-fill ph-check-circle text-base"></i> <span class="text-xs font-semibold">Tersimpan</span>`;

            getTargetNutrition() {
                const age = this.state.profile.age;
                
                // Standar Angka Kecukupan Gizi (AKG) Kemenkes RI Tahun 2019
                // cal: Kalori(kkal), p: Protein(g), f: Lemak(g), c: Karbo(g)
                // a: Vit A(mcg), z: Zinc(mg), fe: Zat Besi(mg), ca: Kalsium(mg), vitc: Vit C(mg)
                
                if (age < 6) {
                    // 0 - 5 Bulan (Fase ASI Eksklusif)
                    return { cal: 550, p: 9, f: 31, c: 59, a: 375, z: 1.5, fe: 0.3, ca: 200, vitc: 40 };
                } 
                else if (age >= 6 && age <= 11) {
                    // 6 - 11 Bulan (Fase MPASI Awal) - Zat Besi butuh sangat tinggi!
                    return { cal: 800, p: 15, f: 35, c: 105, a: 400, z: 3.0, fe: 11.0, ca: 270, vitc: 50 };
                } 
                else if (age >= 12 && age <= 36) {
                    // 1 - 3 Tahun (Batita)
                    return { cal: 1050, p: 20, f: 45, c: 215, a: 400, z: 3.0, fe: 7.0, ca: 650, vitc: 40 };
                } 
                else {
                    // 4 - 6 Tahun (Prasekolah)
                    return { cal: 1400, p: 25, f: 50, c: 220, a: 450, z: 5.0, fe: 10.0, ca: 1000, vitc: 45 };
                }
            }

            calculateRecipeStats(recipe) {
                let totalCost = 0;
                let totalNut = { cal: 0, p: 0, f: 0, c: 0, a: 0, z: 0, fe: 0, ca: 0, vitc: 0 };
                recipe.ingredients.forEach(ing => {
                    const m = this.state.market.find(x => x.id === ing.id);
                    if (m) {
                        totalCost += (ing.g / m.qty_g) * m.price;
                        const mul = ing.g / 100;
                        totalNut.cal += m.nut.cal * mul;
                        totalNut.p   += m.nut.p   * mul;
                        totalNut.f   += (m.nut.f || 0) * mul;
                        totalNut.c   += (m.nut.c || 0) * mul;
                        totalNut.a   += m.nut.a   * mul;
                        totalNut.z   += m.nut.z   * mul;
                        totalNut.fe  += m.nut.fe  * mul;
                        totalNut.ca  += (m.nut.ca || 0) * mul;
                        totalNut.vitc+= (m.nut.vitc || 0) * mul;
                    }
                });
                return { cost: totalCost, nut: totalNut };
            }

                    <div class="flex flex-col items-center justify-center py-12 text-center">
                        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-sm font-medium text-slate-500">AI menghitung kombinasi gizi terbaik...</p>
                    </div>`;
                setTimeout(() => this.executeOptimizationAlgorithm(), 800);
            }

            executeOptimizationAlgorithm() {
                const budget = this.state.profile.budget;
                const targetNut = this.getTargetNutrition();
                const analyzed = RECIPE_DB.map(r => ({ ...r, ...this.calculateRecipeStats(r) }));

                let bestMenu = null, bestScore = -1, bestStats = null;

                for (let i=0;i<analyzed.length;i++)
                    for (let j=i+1;j<analyzed.length;j++)
                        for (let k=j+1;k<analyzed.length;k++) {
                            const [r1,r2,r3] = [analyzed[i],analyzed[j],analyzed[k]];
                            const totalCost = r1.cost + r2.cost + r3.cost;
                            if (totalCost <= budget) {
                                const tP = r1.nut.p+r2.nut.p+r3.nut.p;
                                const tF = r1.nut.f+r2.nut.f+r3.nut.f;
                                const tC = r1.nut.c+r2.nut.c+r3.nut.c;
                                const tFe= r1.nut.fe+r2.nut.fe+r3.nut.fe;
                                const tZ = r1.nut.z+r2.nut.z+r3.nut.z;
                                const tA = r1.nut.a+r2.nut.a+r3.nut.a;
                                const tCa= r1.nut.ca+r2.nut.ca+r3.nut.ca;
                                const tVitC= r1.nut.vitc+r2.nut.vitc+r3.nut.vitc;
                                
                                // Prioritas AI tetap pada Protein, Zinc, Zat Besi, Vit A (fokus Stunting)
                                const score = Math.min(tP/targetNut.p,1)*40 + Math.min(tZ/targetNut.z,1)*30 +
                                              Math.min(tFe/targetNut.fe,1)*20 + Math.min(tA/targetNut.a,1)*10;
                                
                                if (score > bestScore) {
                                    bestScore = score;
                                    bestMenu = [r1,r2,r3];
                                    bestStats = { cost: totalCost, nut: {
                                        cal: r1.nut.cal+r2.nut.cal+r3.nut.cal, p:tP, f:tF, c:tC, a:tA, z:tZ, fe:tFe, ca:tCa, vitc:tVitC } };
                                }
                            }
                        }

                // Jika anggaran terlalu kecil, AI ambil menu termurah sebisa mungkin
                if (!bestMenu) {
                    const sorted = [...analyzed].sort((a,b)=>a.cost-b.cost);
                    let menu=[], cost=0, nut={cal:0,p:0,f:0,c:0,a:0,z:0,fe:0,ca:0,vitc:0};
                    for (const r of sorted) {
                        if (cost + r.cost <= budget) {
                            menu.push(r); cost += r.cost;
                            nut.p+=r.nut.p; nut.f+=r.nut.f; nut.c+=r.nut.c; nut.a+=r.nut.a; nut.z+=r.nut.z; nut.fe+=r.nut.fe; nut.ca+=r.nut.ca; nut.vitc+=r.nut.vitc; nut.cal+=r.nut.cal;
                        }
                    }
                    if (menu.length) { bestMenu = menu; bestStats = { cost, nut }; }
                }
                this.renderPlannerResults(bestMenu, bestStats, targetNut);
            }

            renderPlannerResults(menus, stats, target) {
                this.lastGeneratedMenu = menus;
                this.lastGeneratedStats = stats;
                this.lastTargetNut = target;
                const area = document.getElementById('planner-results');

                if (!menus || menus.length === 0) {
                    area.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-2xl p-5 text-center">
                            <i class="ph-fill ph-warning-circle text-3xl text-red-500 mb-2"></i>
                            <p class="text-sm font-semibold text-red-700">Anggaran terlalu rendah untuk menyusun menu.</p>
                            <p class="text-xs text-red-500 mt-1">Coba tambah anggaran atau periksa harga pasar lokal.</p>
                        </div>`;
                    return;
                }

                const times = ['Sarapan', 'Makan Siang', 'Makan Malam', 'Selingan'];
                const allTips = new Set();
                let menuHTML = '';
                menus.forEach((m, i) => {
                    if (m.tips) allTips.add(m.tips);
                    menuHTML += `
                        <div class="relative pl-5">
                            <div class="absolute left-0 top-1.5 w-2.5 h-2.5 bg-emerald-500 rounded-full ring-4 ring-emerald-100"></div>
                            <p class="text-[11px] font-bold text-emerald-600 uppercase tracking-wide">${times[i] || 'Selingan'}</p>
                            <p class="text-sm font-semibold text-slate-800 mt-0.5">${m.name}</p>
                            <p class="text-xs text-slate-400 mt-0.5">Est. Biaya: ${this.formatIDR(m.cost)}</p>
                        </div>`;
                });

                const bar = (label, cur, max, unit, cl) => {
                    const pct = Math.min((cur/max)*100, 100);
                    return `
                        <div>
                            <div class="flex justify-between text-xs mb-1.5">
                                <span class="font-semibold text-slate-700">${label}</span>
                                <span class="text-slate-400">${cur.toFixed(1)} / ${max} ${unit}</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5">
                                <div class="${cl} h-2.5 rounded-full progress-bar-fill" style="width:0%" data-target-width="${pct}%"></div>
                            </div>
                        </div>`;
                };

                area.innerHTML = `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-pop">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-800 text-sm">Rekomendasi Menu Harian</h3>
                            <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2.5 py-1 rounded-full">Total: ${this.formatIDR(stats.cost)}</span>
                        </div>
                        <div class="space-y-4 border-l-2 border-emerald-100 ml-1">${menuHTML}</div>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-pop">
                        <h3 class="font-bold text-slate-800 mb-4 text-sm">Pemenuhan Target Gizi</h3>

                        <div id="nutrition-bars" class="space-y-4">
                            ${bar('Protein', stats.nut.p, target.p, 'g', 'bg-emerald-500')}
                            ${bar('Lemak', stats.nut.f, target.f, 'g', 'bg-yellow-400')}
                            ${bar('Karbohidrat', stats.nut.c, target.c, 'g', 'bg-orange-400')}
                            ${bar('Zinc', stats.nut.z, target.z, 'mg', 'bg-blue-500')}
                            ${bar('Zat Besi', stats.nut.fe, target.fe, 'mg', 'bg-red-500')}
                            ${bar('Kalsium', stats.nut.ca, target.ca, 'mg', 'bg-indigo-400')}
                            ${bar('Vitamin A', stats.nut.a, target.a, 'mcg', 'bg-amber-500')}
                            ${bar('Vitamin C', stats.nut.vitc, target.vitc, 'mg', 'bg-lime-500')}
                            ${bar('Kalori', stats.nut.cal, target.cal, 'kcal', 'bg-slate-400')}
                        </div>

                    </div>

                    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 shadow-sm animate-pop">
                        <h3 class="font-bold text-amber-800 mb-2 flex items-center text-sm">
                            <i class="ph-fill ph-lightbulb text-lg mr-2"></i> Strategi Edukasi
                        </h3>
                        <ul class="text-sm text-amber-900 space-y-2 list-disc pl-4 marker:text-amber-500">
                            ${Array.from(allTips).map(t=>`<li>${t}</li>`).join('') || '<li>Berikan pujian saat anak menghabiskan makanannya.</li>'}
                        </ul>
                    </div>
                    
                    <!-- TAMBAHAN TOMBOL SIMPAN KE RIWAYAT -->
                    <button onclick="app.saveToHistory()" class="w-full bg-slate-800 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 hover:bg-slate-700 transition flex items-center justify-center animate-pop">
                        <i class="ph-bold ph-bookmark-simple mr-2 text-lg"></i> Simpan ke Riwayat Mingguan
                    </button>`;

                setTimeout(() => {
                    area.querySelectorAll('.progress-bar-fill').forEach(b => b.style.width = b.dataset.targetWidth);
                }, 100);
            }

            // TAMBAHKAN FUNGSI INI
            saveToHistory() {
                if (!this.lastGeneratedMenu) return;
                
                // Inisialisasi history jika belum ada dari storage versi lama
                if (!this.state.history) this.state.history = []; 
                
                const now = new Date();
                const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
                
                const entry = {
                    id: 'hist_' + Date.now(),
                    date: dateStr,
                    menus: this.lastGeneratedMenu.map(m => m.name),
                    cost: this.lastGeneratedStats.cost
                };

                this.state.history.unshift(entry); // Simpan di urutan teratas
                
                // Batasi riwayat maksimal 7 hari terakhir agar tidak memberatkan memori
                if (this.state.history.length > 7) this.state.history.pop();
                
                this.saveState();
                this.showToast("Menu berhasil disimpan ke Riwayat!");
            }

            renderHistory() {
                const container = document.getElementById('weekly-history-container');
                if (!container) return;

                if (!this.state.history || this.state.history.length === 0) {
                    container.innerHTML = `<div class="bg-white p-4 rounded-2xl border border-slate-100 text-center"><p class="text-xs text-slate-400">Belum ada riwayat menu mingguan tersimpan.</p></div>`;
                    return;
                }

                let html = `<h3 class="font-bold text-sm text-slate-700 mb-2 flex items-center"><i class="ph-fill ph-calendar-check mr-2 text-emerald-500 text-lg"></i> Riwayat 7 Menu Terakhir</h3>`;
                
                this.state.history.forEach((h, idx) => {
                    html += `
                        <div class="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-10 bg-red-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer" onclick="app.deleteHistory(${idx})">
                                <i class="ph-bold ph-trash text-red-500"></i>
                            </div>
                            <p class="text-xs font-bold text-slate-800 mb-1">${h.date} <span class="text-emerald-600 font-normal ml-1">(${this.formatIDR(h.cost)})</span></p>
                            <p class="text-[11px] text-slate-500 leading-tight">${h.menus.join(' • ')}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            deleteHistory(index) {
                if(confirm("Hapus menu ini dari riwayat?")) {
                    this.state.history.splice(index, 1);
                    this.saveState();
                    this.renderHistory();
                }
            }

            exportJSON() {
                const blob = new Blob([JSON.stringify(this.state, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `GiziDesa_Data_${Date.now()}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                this.showToast("Data berhasil diekspor.");
            }

            importJSON(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed && parsed.profile && parsed.market) {
                            this.state = parsed; this.saveState();
                            this.showToast("Data berhasil diimpor.");
                            this.switchTab('profile');
                        } else throw new Error("Invalid");
                    } catch { this.showToast("Gagal membaca file JSON. Format salah."); }
                };
                reader.readAsText(file);
                event.target.value = '';
            }

            loadSampleData() {
                this.state = getInitialState();
                this.state.profile = { age: 24, weight: 9.5, height: 80, budget: 18000, lat: null, lng: null, locationName: 'Belum diatur' };
                this.saveState();
                this.showToast("Data Kasus Sampel dimuat!");
                this.switchTab('profile');
            }

            exportToPDF() {
                if (!this.lastGeneratedMenu) {
                    this.showToast("Jalankan AI di menu 'Rekomendasi' dulu.");
                    return;
                }
                this.showToast("Memproses dokumen PDF...");
                const container = document.createElement('div');
                // Hapus padding:30px agar tidak dobel dengan margin html2pdf
                container.style.cssText = 'font-family:Inter,sans-serif;color:#1f2937;';
                
                const times = ['Sarapan', 'Makan Siang', 'Makan Malam', 'Selingan'];
                
                // 1. STYLE, HEADER, & PROFIL
                let html = `
                    <style>
                        tr, li { page-break-inside: avoid !important; }
                    </style>
                    
                    <div style="border-bottom:2px solid #059669;padding-bottom:10px;margin-bottom:15px;">
                        <h1 style="color:#059669;margin:0;font-size:24px;">Laporan Rekomendasi GiziKita</h1>
                        <p style="margin:5px 0 0;color:#6b7280;font-size:14px;">Sistem Pendukung Keputusan Gizi Posyandu</p>
                    </div>
                    
                    <div style="margin-bottom:20px;background:#f3f4f6;padding:15px;border-radius:8px;">
                        <h3 style="margin-top:0;font-size:16px;">Profil Balita</h3>
                        <p style="margin:5px 0;font-size:14px;"><strong>Umur:</strong> ${this.state.profile.age} Bulan | <strong>Berat:</strong> ${this.state.profile.weight} kg | <strong>Tinggi:</strong> ${this.state.profile.height} cm</p>
                        <p style="margin:5px 0;font-size:14px;"><strong>Anggaran Harian:</strong> ${this.formatIDR(this.state.profile.budget)}</p>
                    </div>
                `;

                // 2. TABEL GIZI (Dinaikkan ke atas)
                html += `
                    <h3 style="font-size:16px;border-bottom:1px solid #e5e7eb;padding-bottom:5px;">Capaian Target Gizi</h3>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;text-align:left;margin-bottom:25px;">
                        <tr style="background:#f3f4f6;">
                            <th style="padding:8px;border:1px solid #d1d5db;">Nutrisi</th>
                            <th style="padding:8px;border:1px solid #d1d5db;">Capaian AI</th>
                            <th style="padding:8px;border:1px solid #d1d5db;">Kebutuhan Harian (AKG)</th>
                        </tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Kalori</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.cal.toFixed(0)} kcal</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.cal} kcal</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Protein</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.p.toFixed(1)} g</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.p} g</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Lemak</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.f.toFixed(1)} g</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.f} g</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Karbohidrat</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.c.toFixed(1)} g</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.c} g</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Zinc</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.z.toFixed(1)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.z} mg</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Zat Besi (Fe)</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.fe.toFixed(1)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.fe} mg</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Kalsium</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.ca.toFixed(0)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.ca} mg</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Vitamin A</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.a.toFixed(0)} mcg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.a} mcg</td></tr>
                        <tr><td style="padding:8px;border:1px solid #d1d5db;">Vitamin C</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastGeneratedStats.nut.vitc.toFixed(1)} mg</td><td style="padding:8px;border:1px solid #d1d5db;">${this.lastTargetNut.vitc} mg</td></tr>
                    </table>
                `;

                // 3. REKOMENDASI MENU (Ditaruh di bawah agar mengalir ke halaman berikutnya)
                html += `
                    <h3 style="font-size:16px;border-bottom:1px solid #e5e7eb;padding-bottom:5px;">Rekomendasi Menu Harian (Total: ${this.formatIDR(this.lastGeneratedStats.cost)})</h3>
                    <ul style="list-style:none; padding-left:0; margin-bottom:20px;">
                `;
                
                this.lastGeneratedMenu.forEach((m, i) => {
                    html += `
                        <li style="margin-bottom:12px; font-size:14px; background:#f9fafb; padding:10px; border-left:4px solid #059669; border-radius:4px;">
                            <strong style="color:#059669; font-size:12px; text-transform:uppercase;">${times[i] || 'Selingan'}</strong><br>
                            <strong style="font-size:15px;">${m.name}</strong><br>
                            <span style="color:#4b5563;font-size:12px;">Estimasi Biaya: ${this.formatIDR(m.cost)}</span><br>
                            <span style="color:#6b7280;font-size:12px;"><em>Tips Edukasi: ${m.tips}</em></span>
                        </li>`;
                });
                
                html += `</ul>
                    <p style="margin-top:20px;font-size:10px;color:#9ca3af;text-align:center;">Dihasilkan oleh AI GiziKita - Aplikasi Bekerja Secara Offline</p>
                `;

                container.innerHTML = html;
                
                // Perbaikan margin: [atas, kiri, bawah, kanan]. Atas dikurangi dari 0.5 jadi 0.2 inci.
                html2pdf().set({
                    margin: [0.2, 0.4, 0.4, 0.4], 
                    filename: `Laporan_GiziKita_${this.state.profile.age}bln.pdf`,
                    image: { type:'jpeg', quality:1 }, 
                    html2canvas:{ scale:2, useCORS: true },
                    jsPDF: { unit:'in', format:'a4', orientation:'portrait' },
                    pagebreak: { mode: ['css', 'legacy'] }
                }).from(container).save();
            }

            resetData() {
                localStorage.removeItem(LOCAL_STORAGE_KEY);
                this.state = getInitialState();
                this.saveState();
                this.marketFilter = 'all';
                this.showToast("Semua data direset ke setelan awal.");
                this.switchTab('profile');
                this.updateGPSUI();
            }
        }

        let app;
        window.addEventListener('DOMContentLoaded', () => { app = new GiziDesaApp(); });

                // TAMBAHKAN SCRIPT SERVICE WORKER INI
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker berhasil didaftarkan!'))
                    .catch((err) => console.error('Service Worker gagal:', err));
            });
        }

    </script>
